<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyanko Survivors: 냥코 서바이벌</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1a1a24;
            color: #fff;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            background-color: #2c3e50; /* 마룻바닥 느낌의 어두운 톤 */
            display: block;
        }
        /* UI Overlay */
        .ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bar-container {
            width: 100%;
            height: 22px;
            background: #222;
            border-radius: 11px;
            overflow: hidden;
            border: 2px solid #444;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.1s ease;
        }
        #hp-fill { background: #ff4757; }
        #exp-fill { background: #ff9f43; width: 0%; } /* 치즈색 경험치바 */
        .stats-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            color: #f1f2f6;
            text-shadow: 2px 2px 2px #000;
        }
        /* Upgrade Modal */
        #upgrade-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #upgrade-modal h2 { margin-bottom: 25px; color: #f1c40f; text-shadow: 0 0 10px rgba(241,196,15,0.5); }
        .upgrade-options { display: flex; flex-direction: column; gap: 15px; width: 380px; }
        .upgrade-btn {
            background: #2c3e50;
            border: 2px solid #f1c40f;
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.2s;
            font-weight: bold;
        }
        .upgrade-btn:hover { background: #f1c40f; color: #000; transform: scale(1.03); }
        /* Game Over Screen */
        #gameover-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #gameover-screen h1 { color: #ff4757; font-size: 54px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,71,87,0.4); }
        .score-info { font-size: 22px; margin-bottom: 35px; text-align: center; line-height: 1.8; }
        #restart-btn {
            background: #ff9f43; color: white; border: none; padding: 14px 35px;
            font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer;
            transition: 0.2s; box-shadow: 0 4px 15px rgba(255,159,67,0.4);
        }
        #restart-btn:hover { background: #ff3f34; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="ui-panel">
        <div>
            <div class="stats-text"><span id="hp-text">고양이 체력: 100 / 100</span><span id="score-text">잡은 쥐: 0</span></div>
            <div class="bar-container"><div id="hp-fill" class="bar-fill"></div></div>
        </div>
        <div>
            <div class="stats-text"><span id="level-text">LV. 1</span><span id="exp-text">치즈 획득량: 0%</span></div>
            <div class="bar-container"><div id="exp-fill" class="bar-fill"></div></div>
        </div>
    </div>

    <div id="upgrade-modal">
        <h2>냥이 각성! 간식을 고르세요</h2>
        <div class="upgrade-options" id="upgrade-list"></div>
    </div>

    <div id="gameover-screen">
        <h1>지쳐버린 고양이</h1>
        <div class="score-info">
            <p>이번에 쫓아낸 쥐: <span id="final-score" style="color: #ff9f43; font-weight:bold;">0</span>마리</p>
            <p>최고 기네스 기록: <span id="high-score" style="color: #2ed573; font-weight:bold;">0</span>마리</p>
        </div>
        <button id="restart-btn" onclick="resetGame()">낮잠 자고 다시 하기</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 게임 상태 관리 ---
let player, balls, enemies, crystals, particles;
let score, level, exp, expNeeded, isGameOver, isPaused;
let keys = {};
let spawnTimer = 0;
let spawnInterval = 60;

// --- 능력치 및 테마 데이터 정의 ---
const passives = {
    damageMod: { name: "꾹꾹이 파워 업 (피해량 +20%)", val: 1.0, inc: 0.2 },
    speedMod: { name: "냥이 스텝 (이동 속도 +15%)", val: 1.0, inc: 0.15 },
    orbitSpeedMod: { name: "고속 회전 방울 (회전 속도 +25%)", val: 1.0, inc: 0.25 },
    radiusMod: { name: "사정거리 확장 (회전 반경 +15%)", val: 1.0, inc: 0.15 },
    maxHpMod: { name: "9개의 목숨 (최대 체력 +20% & 회복)", val: 1.0, inc: 0.2 }
};

const ballTypes = {
    NORMAL: { id: "NORMAL", name: "은빛 방울 (균형 잡힌 기본 방울)", color: "#d2dae2", dmg: 15, baseSize: 9 },
    HEAVY:  { id: "HEAVY",  name: "황금 캣닙 구체 (거대하고 강력한 묵직함)", color: "#ffdd59", dmg: 35, baseSize: 16 },
    SWIFT:  { id: "SWIFT",  name: "장난감 쥐돌이 (매우 빠르게 회전)", color: "#ef5777", dmg: 8, baseSize: 6 },
    DRAIN:  { id: "DRAIN",  name: "맑은 생선눈빛 (타격 시 낮은 확률로 체력 회복)", color: "#4bcffa", dmg: 12, baseSize: 9, drain: true },
    CURSE:  { id: "CURSE",  name: "보라빛 실타래 (넓은 궤적으로 적들을 관통)", color: "#5758bb", dmg: 20, baseSize: 11 }
};

let activeBalls = [];

// --- 캐릭터 (고양이) 클래스 ---
class Player {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.baseSpeed = 3.6;
        this.baseMaxHp = 100;
        this.hp = 100;
        this.size = 16;
    }
    get maxHp() { return this.baseMaxHp * passives.maxHpMod.val; }
    get speed() { return this.baseSpeed * passives.speedMod.val; }
    
    move() {
        let dx = 0, dy = 0;
        if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
        if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;

        if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
        this.x += dx * this.speed;
        this.y += dy * this.speed;

        this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
        this.y = Math.max(this.size, Math.min(canvas.height - this.size, this.y));
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        // 1. 고양이 귀 그리기
        ctx.fillStyle = '#f5f6fa';
        ctx.beginPath(); // 왼쪽 귀
        ctx.moveTo(-this.size, -this.size/2);
        ctx.lineTo(-this.size/2, -this.size * 1.3);
        ctx.lineTo(0, -this.size/2);
        ctx.fill();

        ctx.beginPath(); // 오른쪽 귀
        ctx.moveTo(0, -this.size/2);
        ctx.lineTo(this.size/2, -this.size * 1.3);
        ctx.lineTo(this.size, -this.size/2);
        ctx.fill();

        // 귀 안쪽 분홍색
        ctx.fillStyle = '#ff7878';
        ctx.beginPath();
        ctx.moveTo(-this.size*0.8, -this.size*0.6);
        ctx.lineTo(-this.size*0.5, -this.size * 1.1);
        ctx.lineTo(-this.size*0.2, -this.size*0.6);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(this.size*0.2, -this.size*0.6);
        ctx.lineTo(this.size*0.5, -this.size * 1.1);
        ctx.lineTo(this.size*0.8, -this.size*0.6);
        ctx.fill();

        // 2. 고양이 얼굴 몸통
        ctx.fillStyle = '#f5f6fa';
        ctx.beginPath();
        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        ctx.fill();

        // 3. 눈과 코
        ctx.fillStyle = '#2f3542';
        ctx.beginPath();
        ctx.arc(-this.size/2, -2, 2.5, 0, Math.PI*2); // 왼눈
        ctx.arc(this.size/2, -2, 2.5, 0, Math.PI*2);  // 오른눈
        ctx.fill();

        ctx.fillStyle = '#ff7878'; // 분홍코
        ctx.beginPath();
        ctx.moveTo(-2, 3); ctx.lineTo(2, 3); ctx.lineTo(0, 5);
        ctx.fill();

        ctx.restore();
    }
}

// --- 무기 (회전 방울 구체) ---
class OrbitBall {
    constructor(type, index) {
        this.type = type;
        this.index = index; 
        this.baseAngle = (Math.PI * 2 / 5) * index;
        this.runningAngle = 0;
    }
    update(playerX, playerY, ticker) {
        let typeSpeedBonus = this.type.id === "SWIFT" ? 1.8 : 1.0;
        this.runningAngle = ticker * 0.03 * passives.orbitSpeedMod.val * typeSpeedBonus;
        
        let finalAngle = this.baseAngle + this.runningAngle;
        let typeRadiusBonus = this.type.id === "CURSE" ? 1.4 : 1.0;
        let radius = 75 * passives.radiusMod.val * typeRadiusBonus;

        this.x = playerX + Math.cos(finalAngle) * radius;
        this.y = playerY + Math.sin(finalAngle) * radius;
        this.size = this.type.baseSize;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.type.color;
        ctx.shadowBlur = 12;
        ctx.shadowColor = this.type.color;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// --- 에너미 (고양이를 바라보는 쥐) ---
class Enemy {
    constructor() {
        if (Math.random() < 0.5) {
            this.x = Math.random() < 0.5 ? -20 : canvas.width + 20;
            this.y = Math.random() * canvas.height;
        } else {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() < 0.5 ? -20 : canvas.height + 20;
        }
        let diff = score * 0.002;
        this.hp = 15 + Math.floor(diff * 6);
        this.speed = 1.3 + Math.min(1.4, diff * 0.1);
        this.size = 11;
        this.angle = 0; // 고양이를 바라볼 각도 전용 변수
    }
    update(playerX, playerY) {
        // 플레이어를 향해 각도 계산 (쳐다보기 기능 핵심)
        this.angle = Math.atan2(playerY - this.y, playerX - this.x);
        
        // 해당 방향으로 전진
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle); // ★ 고양이 쪽으로 회전 연산 적용!

        // 쥐 꼬리
        ctx.strokeStyle = '#ffa8a8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-this.size, 0);
        ctx.quadraticCurveTo(-this.size*1.5, 5, -this.size*1.8, 2);
        ctx.stroke();

        // 쥐 몸통 (타원형태 회전)
        ctx.fillStyle = '#747d8c';
        ctx.beginPath();
        ctx.ellipse(0, 0, this.size * 1.2, this.size * 0.8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 쥐 귀 (머리 뒤쪽에 쫑긋)
        ctx.fillStyle = '#ffb8b8';
        ctx.beginPath();
        ctx.arc(-2, -this.size*0.7, 4, 0, Math.PI*2);
        ctx.arc(-2, this.size*0.7, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#747d8c';
        ctx.beginPath();
        ctx.arc(-2, -this.size*0.7, 2, 0, Math.PI*2);
        ctx.arc(-2, this.size*0.7, 2, 0, Math.PI*2);
        ctx.fill();

        // 쥐 눈 (전방을 향하도록 배치)
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(this.size*0.5, -3, 1.5, 0, Math.PI*2);
        ctx.arc(this.size*0.5, 3, 1.5, 0, Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

// --- 드롭 치즈 조각 (경험치 고정) ---
class Crystal {
    constructor(x, y) { this.x = x; this.y = y; }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        // 삼각형 모양 황금색 삼각치즈 크래프트
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.moveTo(-6, 6); ctx.lineTo(6, 6); ctx.lineTo(0, -8);
        ctx.closePath();
        ctx.fill();
        
        // 치즈 구멍 묘사
        ctx.fillStyle = '#d35400';
        ctx.beginPath(); ctx.arc(-2, 2, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(2, 3, 1, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

// 솜방망이 타격 임팩트 파티클
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.alpha = 1;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.05; }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

// --- 루프 및 시스템 연산 로직 ---
let ticker = 0;
function init() {
    player = new Player();
    activeBalls = []; enemies = []; crystals = []; particles = [];
    score = 0; level = 1; exp = 0; expNeeded = 5;
    isGameOver = false; isPaused = false; ticker = 0;
    
    for (let key in passives) passives[key].val = 1.0;
    addBall(ballTypes.NORMAL);

    document.getElementById('gameover-screen').style.display = 'none';
    document.getElementById('upgrade-modal').style.display = 'none';
    updateUI();
}

function addBall(type) {
    activeBalls.push(new OrbitBall(type, activeBalls.length));
}

function loop() {
    if (isGameOver || isPaused) return;
    ticker++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    player.move();
    player.draw();

    activeBalls.forEach(ball => {
        ball.update(player.x, player.y, ticker);
        ball.draw();
    });

    if (ticker % Math.max(12, 60 - Math.floor(score/120)) === 0) {
        enemies.push(new Enemy());
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.update(player.x, player.y);
        e.draw();

        let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
        if (distToPlayer < player.size + e.size) {
            player.hp -= 0.4;
            if (player.hp <= 0) gameOver();
            updateUI();
        }

        activeBalls.forEach(ball => {
            let distToBall = Math.hypot(ball.x - e.x, ball.y - e.y);
            if (distToBall < ball.size + e.size) {
                for(let p=0; p<3; p++) particles.push(new Particle(e.x, e.y, ball.type.color));
                e.hp -= ball.type.dmg * passives.damageMod.val;
                if (ball.type.drain && Math.random() < 0.08) {
                    player.hp = Math.min(player.maxHp, player.hp + 1);
                }
            }
        });

        if (e.hp <= 0) {
            crystals.push(new Crystal(e.x, e.y));
            enemies.splice(i, 1);
            score++;
            updateUI();
        }
    }

    for (let i = crystals.length - 1; i >= 0; i--) {
        let c = crystals[i];
        c.draw();
        let dist = Math.hypot(player.x - c.x, player.y - c.y);
        if (dist < player.size + 18) {
            crystals.splice(i, 1);
            gainExp(1);
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.update(); p.draw();
        if (p.alpha <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(loop);
}

function gainExp(amount) {
    exp += amount;
    if (exp >= expNeeded) {
        exp -= expNeeded;
        level++;
        expNeeded = Math.floor(expNeeded * 1.35) + 4;
        triggerUpgrade();
    }
    updateUI();
}

function triggerUpgrade() {
    isPaused = true;
    const modal = document.getElementById('upgrade-modal');
    const listContainer = document.getElementById('upgrade-list');
    listContainer.innerHTML = '';

    let pool = [];
    if (activeBalls.length < 5) {
        Object.keys(ballTypes).forEach(key => {
            pool.push({ type: 'BALL', data: ballTypes[key], label: `🐾 [새 장난감] ${ballTypes[key].name}` });
        });
    }
    Object.keys(passives).forEach(key => {
        pool.push({ type: 'PASSIVE', data: key, label: `⚡ [훈련] ${passives[key].name}` });
    });

    let shuffled = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
    shuffled.forEach(opt => {
        let btn = document.createElement('button');
        btn.className = 'upgrade-btn';
        btn.innerText = opt.label;
        btn.onclick = () => applyUpgrade(opt);
        listContainer.appendChild(btn);
    });

    modal.style.display = 'flex';
}

function applyUpgrade(option) {
    if (option.type === 'BALL') {
        addBall(option.data);
    } else if (option.type === 'PASSIVE') {
        let pKey = option.data;
        passives[pKey].val += passives[pKey].inc;
        if (pKey === 'maxHpMod') player.hp = player.maxHp;
    }
    document.getElementById('upgrade-modal').style.display = 'none';
    isPaused = false;
    updateUI();
    requestAnimationFrame(loop);
}

function updateUI() {
    document.getElementById('hp-text').innerText = `고양이 체력: ${Math.max(0, Math.floor(player.hp))} / ${Math.floor(player.maxHp)}`;
    document.getElementById('hp-fill').style.width = `${(player.hp / player.maxHp) * 100}%`;
    document.getElementById('score-text').innerText = `쫓아낸 쥐: ${score} 마리`;
    document.getElementById('level-text').innerText = `LV. ${level}`;
    let expPct = (exp / expNeeded) * 100;
    document.getElementById('exp-text').innerText = `치즈 포만감: ${Math.floor(expPct)}%`;
    document.getElementById('exp-fill').style.width = `${expPct}%`;
}

function gameOver() {
    isGameOver = true;
    let highScore = localStorage.getItem('cat_mice_high_score') || 0;
    if (score > highScore) {
        localStorage.setItem('cat_mice_high_score', score);
        highScore = score;
    }
    document.getElementById('final-score').innerText = score;
    document.getElementById('high-score').innerText = highScore;
    document.getElementById('gameover-screen').style.display = 'flex';
}

function resetGame() { init(); requestAnimationFrame(loop); }

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
